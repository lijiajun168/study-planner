<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>留学方案推荐</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section id="countryView" class="view active" aria-labelledby="countryTitle">
        <div class="topbar">
          <div>
            <p class="eyebrow">Study Planner</p>
            <h1 id="countryTitle">选择目标地区</h1>
          </div>
          <span class="badge">方案初筛</span>
        </div>

        <div class="country-grid" id="countryGrid" aria-label="国家和地区"></div>
      </section>

      <section id="formView" class="view" aria-labelledby="formTitle">
        <button class="ghost-button" id="backToCountries" type="button">返回选择</button>
        <div class="panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow" id="selectedCountryLabel">目标地区</p>
              <h2 id="formTitle">填写学生信息</h2>
            </div>
            <span class="badge muted">本科背景</span>
          </div>

          <form id="studentForm" class="form-grid">
            <label>
              <span>昵称</span>
              <input name="nickname" required autocomplete="name" placeholder="例如：Alex" />
            </label>
            <label>
              <span>本科学校全称</span>
              <input name="university" required placeholder="例如：华南理工大学" />
            </label>
            <label>
              <span>本科院校类型</span>
              <select name="schoolType">
                <option value="auto">自动识别</option>
                <option value="985">985院校</option>
                <option value="211">211院校</option>
                <option value="public_non211">一本双非 / 公办本科</option>
                <option value="private">三本民办 / 独立学院</option>
              </select>
            </label>
            <label>
              <span>本科专业</span>
              <input name="major" required placeholder="例如：金融学 / 计算机科学" />
            </label>
            <label>
              <span>百分制平均分</span>
              <input name="score" required type="number" min="0" max="100" step="0.1" placeholder="例如：86.5" />
            </label>
            <label class="full-span">
              <span>特殊说明（选填）</span>
              <textarea name="notes" rows="4" placeholder="例如：希望转专业申请；有相关实习；数学课程较多"></textarea>
            </label>
            <button class="primary-button" type="submit">生成方案</button>
          </form>
        </div>
      </section>

      <section id="resultView" class="view" aria-labelledby="resultTitle">
        <div class="result-head">
          <button class="ghost-button" id="editInfo" type="button">修改信息</button>
          <button class="ghost-button" id="restart" type="button">重新选择地区</button>
        </div>

        <div class="summary">
          <p class="eyebrow" id="resultCountry">推荐结果</p>
          <h2 id="resultTitle"></h2>
          <p id="profileSummary"></p>
        </div>

        <div id="recommendations" class="recommendation-grid"></div>

        <aside class="notice">
          <strong>使用说明</strong>
          <p>
            本工具用于方案初筛。录取结果还会受到课程容量、文书、先修课、语言成绩、工作经历和当年招生政策影响；正式递交前应复核每个项目官网的最新要求。
          </p>
        </aside>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
